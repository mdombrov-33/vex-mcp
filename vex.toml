[server]
id = "my-mcp-server"
pin_store = "pins.json"

[policy]
default_action = "deny"   # "deny": only allowed_tools pass. "allow": everything except blocked_tools

# Patterns match the bare tool name as the server reports it (one server per
# instance, so no prefix). Names match literally; `*`, `?`, `[...]` are globs.
# e.g. "read_*" matches read_file, read_multiple_files, …

# Under default-deny, list the tools the model is permitted to call:
allowed_tools = [
  # "read_file",
  # "list_directory",
]

# An explicit block wins even over allowed_tools / default-allow:
blocked_tools = [
  # "write_file",
  # "delete_file",
  # "write_*",
]

# Currently behaves like a block (no live prompt yet — see ADR-0003 / roadmap).
# A human "approves" by editing this file, not by answering a prompt.
confirmation_required = [
  # "move_file",
  # "edit_file",
]

[audit]
path = "vex-audit.log"

# [rate_limit]
# max_calls_per_minute = 60   # tool calls per server; omit for no limit
# max_message_bytes = 1048576 # 1 MB; omit for no limit
